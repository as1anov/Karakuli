<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=none, viewport-fit=cover">
    <title>Karakuli: Digital Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700;800&swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg-color: #e8e8e8;
            --canvas-bg: #e8e8e8;
            --panel-bg: rgba(188, 188, 188, 0.4); 
            --text-color: #000000; 
            --icon-color: #000000;
            --kbd-text-color: #6D6E71;
            --kbd-icon-color: #6D6E71;
            --kbd-label-color: #6D6E71;
            --ui-accent: rgba(0, 0, 0, 0.08);
            --glass-blur: blur(12px);
            --border-color: rgba(0, 0, 0, 0.1);
            --nav-cursor-color: #FF6666;
            --draw-cursor-color: #404040; 
            --active-key-color: #000000;
            --border-radius: 12px;
            --main-font: 'Sora', sans-serif;
            --header-height: 43px;
            --dot-color: 0, 0, 0;
            --dot-opacity: 0.25; 
            --icon-stroke: 2; 
            --active-btn-bg: rgba(0, 0, 0, 0.15); 
            --handle-icon-color: #939598;
            --disabled-color: #555555;
            --tl-track-bg: rgba(0, 0, 0, 0.1);
            --tl-progress-fill: #000000;
            
            --google-blue: #4285F4;
            --google-blue-hover: #3367d6;
            --google-blue-active: #2a56ad;
            
            --kbd-max-width: 500px;
            --kbd-margin: 20px;
            --sidebar-width: 300px;
        }

        [data-theme="dark"] {
            --bg-color: #111111;
            --canvas-bg: #111111;
            --panel-bg: rgba(34, 34, 34, 0.3);
            --text-color: #E8E8E8;
            --icon-color: #E8E8E8;
            --ui-accent: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.1);
            --dot-color: 255, 255, 255;
            --dot-opacity: 0.15;
            --active-btn-bg: rgba(255, 255, 255, 0.15);
            --disabled-color: #666666;
            --tl-track-bg: rgba(255, 255, 255, 0.1);
            --tl-progress-fill: #FFFFFF;
        }

        [data-theme="system"] {
            --bg-color: #0f172a;
            --canvas-bg: #0f172a;
            --panel-bg: rgba(30, 58, 138, 0.4);
            --text-color: #93c5fd;
            --icon-color: #60a5fa;
            --ui-accent: rgba(59, 130, 246, 0.2);
            --border-color: rgba(59, 130, 246, 0.3);
            --dot-color: 59, 130, 246;
            --dot-opacity: 0.3;
            --active-btn-bg: rgba(37, 99, 235, 0.4);
            --draw-cursor-color: #60a5fa;
            --disabled-color: #334155;
            --tl-track-bg: rgba(255,255,255,0.1);
            --tl-progress-fill: #60a5fa;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
            outline: none;
            box-sizing: border-box;
            touch-action: none; 
        }

        html, body {
            margin: 0; padding: 0;
            width: 100vw;
            height: 100%;
            overflow: hidden;
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color);
        }

        body {
            display: flex; justify-content: center; align-items: center; 
            font-family: var(--main-font);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
        }

        #main-content {
            width: 100%;
            height: 100%;
            transition: filter 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.dashboard-open #main-content {
            filter: blur(8px);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
        }

        /* --- TOP NAV --- */
        .top-nav-container {
            position: fixed; 
            top: max(20px, env(safe-area-inset-top)); 
            left: 0; right: 0;
            z-index: 500; display: flex; justify-content: space-between;
            align-items: flex-start; padding: 0 20px; pointer-events: none;
        }

        .top-nav-wrapper { 
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            pointer-events: none; position: absolute; left: 50%; transform: translateX(-50%);
            width: fit-content;
        }
        
        .mode-header, .control-btn { 
            height: var(--header-height); border-radius: var(--border-radius); 
            color: var(--text-color); display: flex; justify-content: center; 
            align-items: center; cursor: pointer; transition: all 0.2s ease; 
            font-weight: 600; pointer-events: auto; 
            background: var(--panel-bg); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color);
        }
        
        .mode-header { width: 140px; font-size: 13px; text-align: center; }
        .control-btn { width: var(--header-height); aspect-ratio: 1 / 1; }
        
        .control-btn.active { 
            background: var(--active-btn-bg);
            border-color: var(--text-color);
        }

        /* --- DASHBOARD / SIDEBAR --- */
        #dashboard-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.15); z-index: 2500; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #dashboard-overlay.open { opacity: 1; pointer-events: auto; }

        #dashboard {
            position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width);
            background: var(--bg-color); z-index: 2600; transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column; padding: max(40px, env(safe-area-inset-top)) 24px 24px 24px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.1);
        }
        #dashboard.open { transform: translateX(0); }

        /* Dashboard Tabs Revision */
        .dash-header-tabs {
            display: flex; margin-bottom: 20px; flex-shrink: 0;
            background: transparent; padding: 0; border: none;
            border-bottom: 1px solid var(--border-color); border-radius: 0;
        }
        .dash-tab {
            flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 700;
            color: var(--disabled-color); cursor: pointer; border-radius: 0;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none; background: transparent; position: relative;
        }
        .dash-tab.active {
            color: var(--text-color); background: transparent; box-shadow: none;
        }
        .dash-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%;
            height: 2px; background: var(--text-color);
        }

        .dash-content-container {
            display: flex; flex-direction: column; flex-grow: 1; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 24px;
        }
        .dash-content-container::-webkit-scrollbar { display: none; }
        .dash-content-container { -ms-overflow-style: none; scrollbar-width: none; }
        
        #dash-games { display: none; }

        .dash-section { margin-bottom: 24px; flex-shrink: 0; } 
        .dash-label { 
            font-size: 10px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 0.8px; color: var(--disabled-color); 
            margin-bottom: 12px; display: block; 
        }
        
        .dash-btn {
            width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border-color);
            background: var(--panel-bg); color: var(--text-color); display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 13px; font-weight: 600;
        }
        .dash-btn:last-child { margin-bottom: 0; }
        .dash-btn:hover { background: var(--active-btn-bg); }
        .dash-btn:active { transform: scale(0.97); }
        .dash-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }

        .theme-container {
            display: flex; background: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color);
            padding: 3px; gap: 3px;
        }
        .theme-opt {
            flex: 1; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; transition: all 0.2s; color: var(--disabled-color);
        }
        .theme-opt.active { background: var(--bg-color); color: var(--text-color); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        /* --- LOGIN BOX ADJUSTMENT --- */
        .login-box {
            margin-top: auto; padding-top: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); 
            border-top: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0;
        }

        .user-profile { display: flex; align-items: center; gap: 12px; width: 100%; padding: 8px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
        .user-info { display: flex; flex-direction: column; overflow: hidden; }
        .user-name { font-size: 13px; font-weight: 700; color: var(--text-color); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .user-email { font-size: 11px; color: var(--disabled-color); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

        .google-btn { background: var(--google-blue) !important; color: white !important; border: none !important; box-shadow: 0 4px 12px rgba(66, 133, 244, 0.25); transition: all 0.2s ease; justify-content: center; width: 100%; }
        .google-btn:hover { background: var(--google-blue-hover) !important; box-shadow: 0 6px 16px rgba(66, 133, 244, 0.35); }
        .google-btn:active { background: var(--google-blue-active) !important; transform: scale(0.96); box-shadow: 0 2px 4px rgba(66, 133, 244, 0.2); }

        /* --- TIMELINE PANEL --- */
        #timelapse-toolbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(200px);
            width: calc(100% - 40px); max-width: var(--kbd-max-width); z-index: 2100;
            display: flex; flex-direction: column; gap: 12px; padding: 15px; 
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; background: var(--panel-bg); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 20px;
        }
        #timelapse-toolbar.visible { transform: translateX(-50%) translateY(0); pointer-events: auto; }
        .tl-row-top { width: 100%; }
        .tl-progress-container { width: 100%; height: 12px; display: flex; align-items: center; cursor: pointer; }
        .tl-progress-track { width: 100%; height: 4px; background: var(--tl-track-bg); border-radius: 2px; position: relative; overflow: hidden; }
        .tl-progress-fill { width: 0%; height: 100%; background: var(--tl-progress-fill); transition: width 0.05s linear; }
        .tl-row-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .tl-left-group { display: flex; align-items: center; gap: 12px; }
        .tl-right-group { display: flex; align-items: center; gap: 8px; }
        .tl-time-display { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text-color); min-width: 100px; }
        .tl-action-btn {
            width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-color); background: rgba(0, 0, 0, 0.05); transition: all 0.2s; border: 1px solid transparent;
        }
        [data-theme="dark"] .tl-action-btn { background: rgba(255, 255, 255, 0.05); }
        .tl-action-btn:active { background: var(--active-btn-bg); transform: scale(0.92); }
        .tl-action-btn.speed-btn { font-family: 'JetBrains Mono', monospace; font-size: 12.65px; font-weight: 800; }

        /* Keyboard */
        #mobile-keyboard {
            position: fixed; bottom: 0; left: 50%; transform: translate(-50%, calc(100% + 50px)); 
            width: calc(100% - 40px); max-width: var(--kbd-max-width); z-index: 2000;
            display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; background: transparent; border: none;
        }
        #mobile-keyboard.open { transform: translate(-50%, 0); pointer-events: auto; }
        .keyboard-trigger-area { width: 100%; height: 30px; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; }
        .keyboard-close-bar { width: 50px; height: 4px; background: var(--kbd-text-color); border-radius: 2px; opacity: 0; transform: scaleX(0.5); transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        #mobile-keyboard.open .keyboard-close-bar { opacity: 0.6; transform: scaleX(1); }

        .handle-arrow { 
            width: 45px; height: 45px; stroke: var(--handle-icon-color); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;
            opacity: 0.6; transition: transform 0.4s ease, opacity 0.4s ease, stroke 0.2s ease; animation: arrow-float 2.5s ease-in-out infinite;
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1999; cursor: pointer; pointer-events: auto;
        }
        @keyframes arrow-float { 0%, 100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-8px); } }

        #mobile-keyboard.open + .handle-arrow, 
        body.timelapse-active .handle-arrow,
        body.game-active .handle-arrow,
        body.dashboard-open .handle-arrow { opacity: 0; pointer-events: none; visibility: hidden; }

        #kbd-main-grid { display: grid; grid-template-rows: repeat(4, 60px); gap: 8px; width: 100%; padding-bottom: 20px; }
        .keyboard-row { display: grid; gap: 8px; pointer-events: auto; width: 100%; height: 100%; }
        .row-3-col { grid-template-columns: repeat(3, 1fr); }
        .row-4-col { grid-template-columns: repeat(4, 1fr); }

        .v-key {
            height: 100%; background: var(--panel-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--kbd-text-color); position: relative; transition: background 0.2s, transform 0.1s, border-color 0.2s; touch-action: none; overflow: hidden;
        }
        .v-key:active { background: var(--active-btn-bg); transform: scale(0.96); }
        .v-key svg { width: 24px; height: 24px; stroke: var(--kbd-icon-color); stroke-width: var(--icon-stroke); fill: none; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
        .v-key .key-label { position: absolute; bottom: 5px; right: 7px; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; color: var(--kbd-label-color); opacity: 0.56; pointer-events: none; }
        .v-key.mode-key { justify-content: center; align-items: center; }
        .v-key .mode-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; display: inline-block; color: var(--kbd-icon-color); transform: scaleY(1.3); transform-origin: center; pointer-events: none; }
        .v-key .mode-sub { position: absolute; bottom: 5px; right: 8px; font-size: 14px; font-weight: 950; color: var(--kbd-label-color); opacity: 0.63; line-height: 1; letter-spacing: -1.5px; pointer-events: none; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100%; z-index: 1; overflow: hidden; touch-action: none; }
        .indicator-text { font-size: 11.2px; font-weight: 400; color: var(--text-color); opacity: 0; transition: opacity 0.3s ease, transform 0.2s ease; letter-spacing: 0.5px; pointer-events: none; transform: translateY(3px); text-align: center; }
        .indicator-text.visible { opacity: 1; transform: translateY(5px); }

        .theme-svg { width: 19.8px; height: 19.8px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }

        @media (max-width: 600px) {
            --sidebar-width: 85vw;
        }

        /* --- NEW CANVAS MODAL --- */
        #new-canvas-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); z-index: 3000; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(4px);
            opacity: 0; transition: opacity 0.3s;
        }
        #new-canvas-modal.show { display: flex; opacity: 1; }
        .modal-content {
            background: var(--bg-color); padding: 30px; border-radius: 20px; width: 320px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color); color: var(--text-color);
        }
        .modal-content h2 { margin: 0; font-size: 18px; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--disabled-color); }
        .input-group input {
            padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--panel-bg); color: var(--text-color);
            font-family: 'JetBrains Mono', monospace; font-size: 16px;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 400; font-size: 14px; transition: opacity 0.2s;
        }
        .modal-btn.primary { background: var(--text-color); color: var(--bg-color); }
        .modal-btn.secondary { background: var(--panel-bg); color: var(--text-color); border: 1px solid var(--border-color); }

        #game-hearts { display: none; gap: 6px; align-items: center; justify-content: center; height: 100%; width: 100%; }
        .pixel-heart { width: 18px; height: 18px; }
    </style>
</head>
<body data-theme="light"> 
    
    <div id="dashboard-overlay" onclick="toggleDashboard()"></div>
    <div id="dashboard">
        <div class="dash-header-tabs">
            <div class="dash-tab active" id="tab-home" onclick="switchDashTab('home')">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </div>
            <div class="dash-tab" id="tab-games" onclick="switchDashTab('games')">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/></svg>
                Games
            </div>
        </div>

        <div class="dash-content-container" id="dash-home">
            <div class="dash-section">
                <span class="dash-label">Workspace</span>
                <div class="dash-btn" onclick="openNewCanvasModal()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Canvas
                </div>
                <div class="dash-btn" style="opacity: 0.5; cursor: not-allowed;">
                    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    My Projects
                </div>
            </div>

            <div class="dash-section">
                <span class="dash-label">Export</span>
                <div style="display: flex; gap: 10px;">
                    <div class="dash-btn" onclick="exportFile('png')" style="flex: 1; justify-content: center; margin-bottom: 0;">
                        <svg viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        PNG
                    </div>
                    <div class="dash-btn" onclick="exportFile('svg')" style="flex: 1; justify-content: center; margin-bottom: 0;">
                        <svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></svg>
                        SVG
                    </div>
                </div>
            </div>

            <div class="dash-section">
                <span class="dash-label">Features</span>
                <div class="dash-btn" onclick="toggleTimelapseUI(); toggleDashboard()">
                    <svg viewBox="0 0 24 24">
                        <path d="M7.75 3.5a1.25 1.25 0 0 0-1.85 1.09v14.82a1.25 1.25 0 0 0 1.85 1.09l12.83-7.41a1.25 1.25 0 0 0 0-2.18L7.75 3.5z" stroke-linejoin="round" />
                    </svg>
                    Time-lapse
                </div>
            </div>

            <div class="dash-section">
                <span class="dash-label">Appearance</span>
                <div class="theme-container">
                    <div class="theme-opt active" id="opt-light" onclick="setTheme('light')">
                        <svg viewBox="0 0 24 24" class="theme-svg"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                    </div>
                    <div class="theme-opt" id="opt-dark" onclick="setTheme('dark')">
                        <svg viewBox="0 0 24 24" class="theme-svg"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 9.215 12.857 9 9 0 1 1-9.608-12.864Z"/></svg>
                    </div>
                    <div class="theme-opt" id="opt-system" onclick="setTheme('system')">
                        <svg viewBox="0 0 24 24" class="theme-svg"><rect width="18" height="13" x="3" y="4" rx="2"/><path d="M12 17v4M8 21h8"/></svg>
                    </div>
                </div>
            </div>

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "API_KEY", authDomain: "DOMAIN", projectId: "ID", storageBucket: "BUCKET", messagingSenderId: "SENDER", appId: "APP_ID" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginContainer = document.getElementById('login-container');

        async function handleGoogleLogin() {
            try { await signInWithPopup(auth, provider); } catch (error) { console.error("Login Error:", error); }
        }

        async function handleLogout() {
            try { await signOut(auth); } catch (error) { console.error("Logout Error:", error); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.innerHTML = `
                    <div class="user-profile">
