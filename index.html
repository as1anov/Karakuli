                        Logout
                    </div>
                `;
                document.getElementById('logout-btn').addEventListener('click', handleLogout);
            } else {
                loginContainer.innerHTML = `
                    <div class="dash-btn google-btn" id="google-login-btn">
                        <svg viewBox="0 0 24 24" style="stroke: white;"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/><path d="M7 12h10M12 7l5 5-5 5"/></svg>
                        Login with Google
                    </div>
                    <div class="dash-btn" onclick="toggleDashboard()" style="border: none; background: transparent; justify-content: center; font-size: 11px; color: var(--disabled-color); margin-bottom: 0; padding: 6px; width: auto; margin-top: -6px;">
                        Continue as Guest
                    </div>
                `;
                const btn = document.getElementById('google-login-btn');
                if (btn) btn.addEventListener('click', handleGoogleLogin);
            }
        });
    </script>

    <script>
        document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

        const INITIAL_DELAY = 520;  
        const REPEAT_INTERVAL = 180; 
        const FRAME_DURATION = 0.08; 

        const BASE_STEP_VAL = 60; let STEP = 30; let LINE_WEIGHT = 58; 
        let segments = []; let specialElements = {}; 
        let curI = 0, curJ = 0; let lastDirection = null; 
        let isDrawingMode = false; let isEraserActive = false;
        const DEFAULT_ERASER_RADIUS = 40; let eraserRadius = DEFAULT_ERASER_RADIUS * 0.25; 
        let offsetX = 0, offsetY = 0; let zoom = 0.48; 
        let history = [], redoStack = []; let isExporting = false;
        let actionTimeout = null; let currentTheme = 'light';
        let isPanning = false;

        let tlHistory = []; 
        let isTimelapseUIOpen = false;
        let isPlayingTl = false;
        let tlCurrentFrame = 0;
        let tlSpeed = 1;
        let tlInterval = null;

        let isDashboardOpen = false;

        let paperWidthMm = 210;
        let paperHeightMm = 297;
        let isPaperVisible = false;

        let isResizingCanvas = false;
        let activeCorner = null;
        let isResizingOnly = false;

        let activePointers = new Map();
        let mainPointerId = null;
        let pX = 0, pY = 0, lastPX = 0, lastPY = 0;
        let lastPinchDist = 0;
        let isPointerDrawing = false;

        // --- GAME VARIABLES ---
        let isGameMode = false;
        let gameState = 'idle'; // idle, loading, start, playing, victory, gameover
        let gameBounds = { minX: 0, maxX: 0, minY: 0, maxY: 0 };
        let targetZoom = 1, targetOffsetX = 0, targetOffsetY = 0;
        let loadingProgress = 0;
        let paddle = { x: 0, y: 0, w: 0, h: 0 };
        let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 0, speed: 0 };
        let gameBricks = { lines: [], nodes: [], diamonds: [] };
        let gameParticles = [];
        let lives = 3;
        let keys = { left: false, right: false };

        const themeConfig = {
            light: { canvasBg: '#e8e8e8', dotColor: '0, 0, 0', dotAlpha: 0.25, geomColor: '#000000', cursorColor: '#FF6666', drawCursor: '#404040' },
            dark: { canvasBg: '#111111', dotColor: '255, 255, 255', dotAlpha: 0.15, geomColor: '#E8E8E8', cursorColor: '#FF6666', drawCursor: '#58595B' },
            system: { canvasBg: '#0f172a', dotColor: '59, 130, 246', dotAlpha: 0.3, geomColor: '#3b82f6', cursorColor: '#60a5fa', drawCursor: '#93c5fd' }
        };

        function switchDashTab(tab) {
            document.getElementById('tab-home').classList.remove('active');
            document.getElementById('tab-games').classList.remove('active');
            document.getElementById('dash-home').style.display = 'none';
            document.getElementById('dash-games').style.display = 'none';
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('dash-' + tab).style.display = 'flex';
        }

        function openNewCanvasModal() {
            isResizingOnly = false;
            toggleDashboard();
            if (isPaperVisible) {
                document.getElementById('canvas-w-input').value = Math.round(paperWidthMm);
                document.getElementById('canvas-h-input').value = Math.round(paperHeightMm);
            }
            const modal = document.getElementById('new-canvas-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function openNewCanvasModalFromCorner() {
            isResizingOnly = true;
            document.getElementById('canvas-w-input').value = Math.round(paperWidthMm);
            document.getElementById('canvas-h-input').value = Math.round(paperHeightMm);
            const modal = document.getElementById('new-canvas-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeNewCanvasModal() {
            const modal = document.getElementById('new-canvas-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function applyNewCanvasSize() {
            const w = parseFloat(document.getElementById('canvas-w-input').value);
            const h = parseFloat(document.getElementById('canvas-h-input').value);
            if (w > 0 && h > 0) {
                paperWidthMm = w;
                paperHeightMm = h;
                isPaperVisible = true;
                closeNewCanvasModal();
                if (!isResizingOnly) {
                    performReset();
                } else {
                    redraw();
                }
            }
        }

        function toggleDashboard() {
            if(isGameMode) return;
            isDashboardOpen = !isDashboardOpen;
            const dash = document.getElementById('dashboard');
            const overlay = document.getElementById('dashboard-overlay');
            if (isDashboardOpen) {
                dash.classList.add('open');
                overlay.classList.add('open');
                document.body.classList.add('dashboard-open');
                handleKbdTrigger('close');
            } else {
                dash.classList.remove('open');
                overlay.classList.remove('open');
                document.body.classList.remove('dashboard-open');
            }
        }

        function updateUIState() {
            const disabledIds = ['menu-btn', 'eraser-btn', 'mode-header'];
            const kbdKeys = document.querySelectorAll('.v-key');
            if (isTimelapseUIOpen) {
                disabledIds.forEach(id => document.getElementById(id).classList.add('disabled'));
                kbdKeys.forEach(k => k.classList.add('disabled'));
            } else {
                disabledIds.forEach(id => document.getElementById(id).classList.remove('disabled'));
                kbdKeys.forEach(k => k.classList.remove('disabled'));
            }
        }

        function toggleTimelapseUI() {
            if(isGameMode) return;
            isTimelapseUIOpen = !isTimelapseUIOpen;
            const toolbar = document.getElementById('timelapse-toolbar');
            if (isTimelapseUIOpen) {
                toolbar.classList.add('visible');
                document.body.classList.add('timelapse-active');
                handleKbdTrigger('close');
                showActionHint("Timelapse", true);
                tlCurrentFrame = 0; 
                if (tlHistory.length > 0) {
                    const first = tlHistory[0];
                    segments = JSON.parse(JSON.stringify(first.segments));
                    specialElements = JSON.parse(JSON.stringify(first.specialElements));
                }
                updateTlProgress();
                stopTlPlayback();
            } else {
                toolbar.classList.remove('visible');
                document.body.classList.remove('timelapse-active');
                stopTlPlayback();
                updateModeUI();
                if (tlHistory.length > 0) {
                    const last = tlHistory[tlHistory.length - 1];
                    segments = JSON.parse(JSON.stringify(last.segments));
                    specialElements = JSON.parse(JSON.stringify(last.specialElements));
                }
            }
            updateUIState(); redraw();
        }

        function captureState() {
            const lastState = tlHistory.length > 0 ? tlHistory[tlHistory.length - 1] : null;
            const currentSegments = JSON.stringify(segments);
            const currentSpecials = JSON.stringify(specialElements);
            if (lastState && JSON.stringify(lastState.segments) === currentSegments && JSON.stringify(lastState.specialElements) === currentSpecials) return;
            tlHistory.push({ segments: JSON.parse(currentSegments), specialElements: JSON.parse(currentSpecials), cursor: { i: curI, j: curJ } });
        }

        function cycleTlSpeed() { if (tlSpeed === 1) setTlSpeed(2); else if (tlSpeed === 2) setTlSpeed(4); else if (tlSpeed === 4) setTlSpeed(8); else setTlSpeed(1); }
        function setTlSpeed(s) { tlSpeed = s; document.getElementById('tl-cycle-speed').innerText = `${s}x`; if (isPlayingTl) { stopTlPlayback(); startTlPlayback(); } }
        function formatTime(totalSeconds) { const m = Math.floor(totalSeconds / 60); const s = Math.floor(totalSeconds % 60); return `${m}:${s.toString().padStart(2, '0')}`; }

        function updateTlProgress() {
            const fill = document.getElementById('tl-fill');
            const totalFrames = Math.max(0, tlHistory.length - 1);
            const percent = totalFrames > 0 ? (tlCurrentFrame / totalFrames) * 100 : 0;
            fill.style.width = `${Math.min(100, percent)}%`;
            const timeDisplay = document.getElementById('tl-current-time');
            const currentSeconds = tlCurrentFrame * FRAME_DURATION;
            const totalSeconds = totalFrames * FRAME_DURATION;
            timeDisplay.innerText = `${formatTime(currentSeconds)} / ${formatTime(totalSeconds)}`;
        }

        function handleTimelineSeek(e) {
            if (tlHistory.length < 2) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const percentage = (e.clientX - rect.left) / rect.width;
            tlCurrentFrame = Math.floor(percentage * (tlHistory.length - 1));
            tlCurrentFrame = Math.max(0, Math.min(tlCurrentFrame, tlHistory.length - 1));
            applyFrame(tlCurrentFrame); updateTlProgress(); redraw();
        }

        function applyFrame(idx) {
            const frame = tlHistory[idx];
            if (!frame) return;
            segments = JSON.parse(JSON.stringify(frame.segments));
            specialElements = JSON.parse(JSON.stringify(frame.specialElements));
            curI = frame.cursor.i; curJ = frame.cursor.j;
        }

        function togglePlayTimelapse() { if (isPlayingTl) stopTlPlayback(); else startTlPlayback(); }

        function startTlPlayback() {
            if (tlHistory.length === 0) return;
            isPlayingTl = true;
            document.getElementById('tl-play-icon').style.display = 'none';
            document.getElementById('tl-pause-icon').style.display = 'block';
            if (tlCurrentFrame >= tlHistory.length - 1) tlCurrentFrame = 0;
            const baseRate = FRAME_DURATION * 1000; 
            tlInterval = setInterval(() => {
                if (tlCurrentFrame < tlHistory.length - 1) {
                    tlCurrentFrame++; applyFrame(tlCurrentFrame); updateTlProgress(); redraw();
                } else stopTlPlayback();
            }, baseRate / tlSpeed);
        }

        function stopTlPlayback() {
            isPlayingTl = false;
            document.getElementById('tl-play-icon').style.display = 'block';
            document.getElementById('tl-pause-icon').style.display = 'none';
            if (tlInterval) clearInterval(tlInterval);
        }

        async function exportTimelapseVideo() {
            if (tlHistory.length === 0) return;
            showActionHint("Exporting video...", true);
            stopTlPlayback(); 
            tlCurrentFrame = 0;
            applyFrame(0); 
            updateTlProgress();
            
            draw(); 
            await new Promise(r => requestAnimationFrame(r));
            
            const canvasElem = document.getElementById('defaultCanvas0');
            const stream = canvasElem.captureStream(60); 
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); 
                a.download = `timelapse-${Date.now()}.webm`; 
                a.click();
                if (isTimelapseUIOpen) showActionHint("Timelapse", true); else showActionHint("Done");
            };
            recorder.start();
            
            for (let i = 0; i < tlHistory.length; i++) {
                tlCurrentFrame = i; 
                applyFrame(i); 
                updateTlProgress(); 
                
                draw();
                await new Promise(r => requestAnimationFrame(r));
                
                if (20 / tlSpeed > 16) {
                    await new Promise(r => setTimeout(r, (20 / tlSpeed) - 16));
                }
            }
            await new Promise(r => setTimeout(r, 500));
            recorder.stop();
        }

        function handleKbdTrigger(action) {
            if ((isTimelapseUIOpen || isDashboardOpen || isGameMode) && action === 'open') return;
            const kbd = document.getElementById('mobile-keyboard');
            if (action === 'open') kbd.classList.add('open'); else if (action === 'close') kbd.classList.remove('open');
        }

        function vKeyStart(event, key) { if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return; if (event) { event.preventDefault(); event.stopPropagation(); } handleActionDown(key); }
        function vKeyEnd(event, key) { if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return; if (event) { event.preventDefault(); event.stopPropagation(); } handleActionUp(key); }

        function setTheme(m) { 
            currentTheme = m; document.body.setAttribute('data-theme', m); 
            document.querySelectorAll('.theme-opt').forEach(opt => opt.classList.remove('active'));
            document.getElementById('opt-' + m).classList.add('active');
            showActionHint(m.charAt(0).toUpperCase() + m.slice(1)); redraw(); 
        }
        
        function showActionHint(t, persistent = false) { 
            let a = document.getElementById('action-indicator'); a.innerText = t; a.classList.add('visible'); 
            if(actionTimeout) { clearTimeout(actionTimeout); actionTimeout = null; }
            if (!persistent) {
                actionTimeout = setTimeout(() => {
                    if (isTimelapseUIOpen || isGameMode) return; 
                    if (!isEraserActive) a.classList.remove('visible'); else updateModeUI(); 
                }, 1200); 
            }
        }

        function saveState() {
            history.push(JSON.parse(JSON.stringify({segments, specialElements, curI, curJ, lastDirection}))); 
            if(history.length > 200) history.shift(); redoStack = []; 
        }

        function undo() { 
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            if(history.length > 0) { 
                redoStack.push(JSON.parse(JSON.stringify({segments, specialElements, curI, curJ, lastDirection}))); 
                let s = history.pop(); segments = s.segments; specialElements = s.specialElements; curI = s.curI; curJ = s.curJ; lastDirection = s.lastDirection; 
                showActionHint('Undo'); redraw(); captureState();
            }
        }

        function redo() { 
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            if(redoStack.length > 0) { 
                history.push(JSON.parse(JSON.stringify({segments, specialElements, curI, curJ, lastDirection}))); 
                let s = redoStack.pop(); segments = s.segments; specialElements = s.specialElements; curI = s.curI; curJ = s.curJ; lastDirection = s.lastDirection; 
                showActionHint('Redo'); redraw(); captureState();
            }
        }
        
        function updateModeUI() {
            if (isTimelapseUIOpen || isGameMode) return;
            const modeHeader = document.getElementById('mode-text');
            const indicator = document.getElementById('action-indicator');
            const eraserBtn = document.getElementById('eraser-btn');
            modeHeader.innerText = isDrawingMode ? "Drawing" : "Navigation";
            if (isEraserActive) { eraserBtn.classList.add('active'); let percent = Math.round((eraserRadius / DEFAULT_ERASER_RADIUS) * 100); showActionHint(`Eraser: ${percent}%`, true); }
            else { eraserBtn.classList.remove('active'); if (!actionTimeout) indicator.classList.remove('visible'); }
        }

        function toggleMode() { 
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            if (isEraserActive) isEraserActive = false; else { isDrawingMode = !isDrawingMode; lastDirection = null; }
            updateModeUI(); redraw(); 
        }
        
        function toggleEraser() { 
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            isEraserActive = !isEraserActive; if (isEraserActive && eraserRadius === DEFAULT_ERASER_RADIUS) eraserRadius = DEFAULT_ERASER_RADIUS * 0.25; 
            updateModeUI(); redraw(); 
        }

        function performReset() { 
            if (isGameMode) return;
            if (isTimelapseUIOpen) {
                isTimelapseUIOpen = false;
                const toolbar = document.getElementById('timelapse-toolbar');
                toolbar.classList.remove('visible');
                document.body.classList.remove('timelapse-active');
                stopTlPlayback();
                updateUIState();
            }
            segments = []; specialElements = {}; curI = 0; curJ = 0; lastDirection = null;
            history = []; redoStack = []; tlHistory = []; tlCurrentFrame = 0;
            offsetX = width / 2; offsetY = height / 2; zoom = 0.48;
            showActionHint('New Canvas'); updateModeUI(); redraw(); captureState(); 
        }

        function checkCornerClick(worldX, worldY) {
            let MM_TO_PX = LINE_WEIGHT / 12;
            let halfW = (paperWidthMm * MM_TO_PX) / 2;
            let halfH = (paperHeightMm * MM_TO_PX) / 2;
            let cs = 30 / zoom; 

            if (Math.abs(worldX - halfW) < cs && Math.abs(worldY - halfH) < cs) return 'br';
            if (Math.abs(worldX + halfW) < cs && Math.abs(worldY - halfH) < cs) return 'bl';
            if (Math.abs(worldX - halfW) < cs && Math.abs(worldY + halfH) < cs) return 'tr';
            if (Math.abs(worldX + halfW) < cs && Math.abs(worldY + halfH) < cs) return 'tl';

            return null;
        }

        function isOverUI(x, y) {
            if (document.getElementById('new-canvas-modal').classList.contains('show')) return true;
            if (isTimelapseUIOpen && y > window.innerHeight - 120) return true;
            if (isDashboardOpen && x < 300) return true;
            const kbd = document.getElementById('mobile-keyboard');
            if (kbd.classList.contains('open')) { 
                const rect = kbd.getBoundingClientRect(); 
                if (x >= rect.left && x <= rect.right && y >= rect.top) return true; 
            }
            const handle = document.querySelector('.handle-arrow');
            if (handle && getComputedStyle(handle).opacity !== '0') {
                const hRect = handle.getBoundingClientRect();
                if (x >= hRect.left - 20 && x <= hRect.right + 20 && y >= hRect.top - 20) return true;
            }
            // Add top nav check
            if (y < 80) return true;
            return false;
        }

        function handleStart(x, y) { 
            if (isOverUI(x, y)) return; 
            
            if (isPaperVisible && !isTimelapseUIOpen && !isExporting && !isGameMode) {
                let worldX = (x - offsetX) / zoom;
                let worldY = (y - offsetY) / zoom;
                let corner = checkCornerClick(worldX, worldY);
                if (corner) {
                    isResizingCanvas = true;
                    activeCorner = corner;
                    let lastClickTimeGlobal = window.lastClickTime || 0;
                    window.lastClickTime = performance.now();
                    return;
                }
            }
            
            window.lastClickTime = performance.now(); 
            isPanning = true; 
        }

        function handleEnd(x, y) {
            if (isResizingCanvas) {
                if (performance.now() - (window.lastClickTime || 0) < 200) {
                    openNewCanvasModalFromCorner();
                } else {
                    paperWidthMm = Math.round(paperWidthMm);
                    paperHeightMm = Math.round(paperHeightMm);
                }
                isResizingCanvas = false;
                activeCorner = null;
                updateModeUI();
                redraw();
                return;
            }

            if (isPanning && performance.now() - (window.lastClickTime || 0) < 200) {
                if (!isOverUI(x, y) && !isTimelapseUIOpen && !isGameMode) {
                    let worldX = (x - offsetX) / zoom; let worldY = (y - offsetY) / zoom;
                    curI = Math.round(worldX / STEP); curJ = Math.round(worldY / STEP); lastDirection = null; redraw();
                    captureState();
                }
            }
            isPanning = false;
        }

        // --- BREAK MAZE LOGIC ---
        function startBreakMaze() {
            if (segments.length === 0 && Object.keys(specialElements).length === 0) {
                showActionHint("Draw something first!", false);
                return;
            }
            if(isDashboardOpen) toggleDashboard();
            isGameMode = true;
            lives = 3;
            document.body.classList.add('game-active');

            // UI Changes
            document.getElementById('mode-text').style.display = 'none';
            document.getElementById('game-hearts').style.display = 'flex';
            document.getElementById('eraser-btn').style.display = 'none';
            
            let menuBtn = document.getElementById('menu-btn');
            menuBtn.innerHTML = `<svg viewBox="0 0 24 24" class="theme-svg"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
            menuBtn.onclick = function(e) { e.stopPropagation(); exitGame(); };

            updateHeartsUI();
            
            buildGameBricks();
            calculateGameBounds();

            // Set targets for smooth camera fly
            let worldW = gameBounds.maxX - gameBounds.minX;
            let worldH = gameBounds.maxY - gameBounds.minY;
            targetZoom = Math.min(width / worldW, height / worldH) * 0.85;
            targetOffsetX = width/2 - ((gameBounds.minX + gameBounds.maxX)/2) * targetZoom;
            targetOffsetY = height/2 - ((gameBounds.minY + gameBounds.maxY)/2) * targetZoom;

            paddle = { w: 8 * STEP, h: LINE_WEIGHT, x: (gameBounds.minX + gameBounds.maxX)/2, y: gameBounds.maxY - LINE_WEIGHT };
            ball = { r: (STEP * 0.7) / 2, x: paddle.x, y: paddle.y - paddle.h/2 - (STEP*0.7)/2, vx: 0, vy: 0, speed: STEP * 0.4 };

            gameState = 'loading';
            loadingProgress = 0;
            gameParticles = [];
            
            showActionHint("Loading Maze...", true);
            loop(); // start animation
        }

        function updateHeartsUI() {
            let html = '';
            let heartSVG = `<svg class="pixel-heart" viewBox="0 0 24 24" fill="#FF6666" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            let emptySVG = `<svg class="pixel-heart" viewBox="0 0 24 24" fill="none" stroke="var(--disabled-color)" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            for(let i=0; i<3; i++) html += (i < lives) ? heartSVG : emptySVG;
            document.getElementById('game-hearts').innerHTML = html;
        }

        function buildGameBricks() {
            gameBricks = { lines: [], nodes: [], diamonds: [] };
            segments.forEach((s, idx) => { gameBricks.lines.push({ id: idx, seg: s, active: true }); });
            for(let id in specialElements) {
                let [i, j] = id.split(',').map(Number);
                if (specialElements[id].isNode) gameBricks.nodes.push({ id: id, x: i*STEP, y: j*STEP, hp: 3 });
                if (specialElements[id].isDiamond) gameBricks.diamonds.push({ id: id, x: i*STEP, y: j*STEP, hp: 1 });
            }
        }

        function calculateGameBounds() {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            segments.forEach(s => {
                minX = Math.min(minX, s.p1.x*STEP, s.p2.x*STEP); maxX = Math.max(maxX, s.p1.x*STEP, s.p2.x*STEP);
                minY = Math.min(minY, s.p1.y*STEP, s.p2.y*STEP); maxY = Math.max(maxY, s.p1.y*STEP, s.p2.y*STEP);
            });
            for(let id in specialElements) {
                let [i, j] = id.split(',').map(Number);
                minX = Math.min(minX, i*STEP - BASE_STEP_VAL); maxX = Math.max(maxX, i*STEP + BASE_STEP_VAL);
                minY = Math.min(minY, j*STEP - BASE_STEP_VAL); maxY = Math.max(maxY, j*STEP + BASE_STEP_VAL);
            }
            if (minX === Infinity) { minX = 0; maxX = width; minY = 0; maxY = height; }
            let pad = 4 * STEP;
            gameBounds = { minX: minX - pad, maxX: maxX + pad, minY: minY - pad, maxY: maxY + pad + 15 * STEP };
        }

        function handleGameInput(type, val) {
            if (!isGameMode) return;
            if ((gameState === 'start' || gameState === 'gameover' || gameState === 'victory') && (type === 'click' || type === 'keydown')) {
                if(gameState === 'gameover' || gameState === 'victory') { startBreakMaze(); return; }
                gameState = 'playing';
                ball.vy = -ball.speed; ball.vx = (Math.random() - 0.5) * ball.speed;
            }
        }

        class Particle {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15 - 5;
                this.life = 1.0;
                this.size = Math.random() * 10 + 5;
                this.rot = Math.random() * TWO_PI;
                this.vRot = (Math.random() - 0.5) * 0.5;
                this.type = type;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.5; this.life -= 0.03; this.rot += this.vRot; }
            draw(col) {
                push(); fill(col); noStroke(); translate(this.x, this.y); rotate(this.rot);
                if(this.type === 'node') circle(0,0, this.size); else rect(0,0, this.size, this.size);
                pop();
            }
        }

        function destroyLineChain(startIndex) {
            let toDestroy = [startIndex];
            gameBricks.lines[startIndex].active = false;
            let count = 1, queue = [startIndex];
            
            while(queue.length > 0 && count < 4) {
                let currIdx = queue.shift();
                let currSeg = gameBricks.lines[currIdx].seg;
                for(let i=0; i<gameBricks.lines.length; i++) {
                    if (!gameBricks.lines[i].active) continue;
                    let s = gameBricks.lines[i].seg;
                    if ((s.p1.x === currSeg.p1.x && s.p1.y === currSeg.p1.y) || (s.p1.x === currSeg.p2.x && s.p1.y === currSeg.p2.y) ||
                        (s.p2.x === currSeg.p1.x && s.p2.y === currSeg.p1.y) || (s.p2.x === currSeg.p2.x && s.p2.y === currSeg.p2.y)) {
                        gameBricks.lines[i].active = false; toDestroy.push(i); queue.push(i); count++;
                        if (count >= 4) break;
                    }
                }
            }
            toDestroy.forEach(idx => {
                let seg = gameBricks.lines[idx].seg;
                for(let j=0; j<3; j++) gameParticles.push(new Particle((seg.p1.x + seg.p2.x)*STEP/2, (seg.p1.y + seg.p2.y)*STEP/2, 'line'));
            });
            gameBricks.lines = gameBricks.lines.filter(l => l.active);
        }

        function distToSegmentSquared(p, v, w) {
            let l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return (p.x - v.x)**2 + (p.y - v.y)**2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            let proj = { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) };
            return { distSq: (p.x - proj.x)**2 + (p.y - proj.y)**2, proj: proj };
        }

        function physicsStep() {
            ball.x += ball.vx; ball.y += ball.vy;
            
            // Walls
            if (ball.x - ball.r < gameBounds.minX) { ball.x = gameBounds.minX + ball.r; ball.vx *= -1; }
            if (ball.x + ball.r > gameBounds.maxX) { ball.x = gameBounds.maxX - ball.r; ball.vx *= -1; }
            if (ball.y - ball.r < gameBounds.minY) { ball.y = gameBounds.minY + ball.r; ball.vy *= -1; }
            
            // Paddle
            let px = constrain(ball.x, paddle.x - paddle.w/2, paddle.x + paddle.w/2);
            let distToPaddle = Math.sqrt((ball.x - px)**2 + (ball.y - paddle.y)**2);
            if (distToPaddle < ball.r + paddle.h/2 && ball.vy > 0) {
                ball.vy = -Math.abs(ball.vy);
                ball.vx += (ball.x - paddle.x) * 0.08;
                let s = Math.sqrt(ball.vx**2 + ball.vy**2);
                ball.vx = (ball.vx/s) * ball.speed; ball.vy = (ball.vy/s) * ball.speed;
            }

            if (ball.y > gameBounds.maxY) {
                lives--; updateHeartsUI();
                if (lives <= 0) { gameState = 'gameover'; }
                else { gameState = 'start'; ball.x = paddle.x; ball.y = paddle.y - paddle.h/2 - ball.r; }
            }

            // Bricks
            for(let i=gameBricks.nodes.length-1; i>=0; i--) {
                let n = gameBricks.nodes[i];
                let d = Math.sqrt((ball.x - n.x)**2 + (ball.y - n.y)**2);
                let outerR = BASE_STEP_VAL; let innerR = BASE_STEP_VAL - LINE_WEIGHT;
                if (d > innerR - ball.r && d < outerR + ball.r) {
                    let nx = (ball.x - n.x) / d; let ny = (ball.y - n.y) / d;
                    if (d < (innerR + outerR)/2) { nx = -nx; ny = -ny; ball.x = n.x - nx * (innerR - ball.r); ball.y = n.y - ny * (innerR - ball.r); } 
                    else { ball.x = n.x + nx * (outerR + ball.r); ball.y = n.y + ny * (outerR + ball.r); }
                    let dot = ball.vx * nx + ball.vy * ny;
                    ball.vx -= 2 * dot * nx; ball.vy -= 2 * dot * ny;
                    n.hp--;
                    for(let j=0; j<5; j++) gameParticles.push(new Particle(ball.x, ball.y, 'node'));
                    if (n.hp <= 0) gameBricks.nodes.splice(i, 1);
                    return;
                }
            }
            
            for(let i=gameBricks.diamonds.length-1; i>=0; i--) {
                let d = gameBricks.diamonds[i];
                let tx = ball.x - d.x; let ty = ball.y - d.y - LINE_WEIGHT/2;
                let c = Math.cos(-Math.PI/4), s = Math.sin(-Math.PI/4);
                let lx = tx * c - ty * s; let ly = tx * s + ty * c;
                let half = LINE_WEIGHT/2;
                let p_x = Math.max(-half, Math.min(lx, half)); let p_y = Math.max(-half, Math.min(ly, half));
                let distSq = (lx - p_x)**2 + (ly - p_y)**2;
                if (distSq < ball.r * ball.r) {
                    let dist = Math.sqrt(distSq); let lnx = (lx - p_x) / dist; let lny = (ly - p_y) / dist;
                    if(dist===0) { lnx = 1; lny = 0; }
                    let bc = Math.cos(Math.PI/4), bs = Math.sin(Math.PI/4);
                    let nx = lnx * bc - lny * bs; let ny = lnx * bs + lny * bc;
                    ball.x += nx * (ball.r - dist + 1); ball.y += ny * (ball.r - dist + 1);
                    let dot = ball.vx * nx + ball.vy * ny; ball.vx -= 2 * dot * nx; ball.vy -= 2 * dot * ny;
                    for(let j=0; j<5; j++) gameParticles.push(new Particle(d.x, d.y + LINE_WEIGHT/2, 'diamond'));
                    gameBricks.diamonds.splice(i, 1);
                    return;
                }
            }

            for(let i=gameBricks.lines.length-1; i>=0; i--) {
                let l = gameBricks.lines[i].seg;
                let p1x = l.p1.x * STEP, p1y = l.p1.y * STEP, p2x = l.p2.x * STEP, p2y = l.p2.y * STEP;
                let res = distToSegmentSquared(ball, {x: p1x, y: p1y}, {x: p2x, y: p2y});
                let r = ball.r + LINE_WEIGHT/2;
                if (res.distSq < r*r) {
                    let dist = Math.sqrt(res.distSq);
                    let nx = (ball.x - res.proj.x) / dist; let ny = (ball.y - res.proj.y) / dist;
                    if (dist === 0) { nx = 1; ny = 0; }
                    ball.x = res.proj.x + nx * r; ball.y = res.proj.y + ny * r;
                    let dot = ball.vx * nx + ball.vy * ny;
                    ball.vx = ball.vx - 2 * dot * nx; ball.vy = ball.vy - 2 * dot * ny;
                    ball.vx += (Math.random() - 0.5); ball.vy += (Math.random() - 0.5);
                    let spd = Math.sqrt(ball.vx**2 + ball.vy**2); ball.vx = (ball.vx/spd)*ball.speed; ball.vy = (ball.vy/spd)*ball.speed;
                    destroyLineChain(i);
                    return;
                }
            }

            if (gameBricks.lines.length === 0 && gameBricks.nodes.length === 0 && gameBricks.diamonds.length === 0) {
                gameState = 'victory'; showActionHint("YOU WIN!", true);
            }
        }

        function drawBreakMaze() {
            background(themeConfig[currentTheme].canvasBg);
            push(); translate(offsetX, offsetY); scale(zoom);
            
            // Bounds
            stroke('rgba(128,128,128,0.2)'); strokeWeight(5); noFill();
            rectMode(CORNER);
            rect(gameBounds.minX, gameBounds.minY, gameBounds.maxX - gameBounds.minX, gameBounds.maxY - gameBounds.minY);

            if (gameState === 'loading') {
                loadingProgress += 0.02;
                zoom = lerp(zoom, targetZoom, 0.1);
                offsetX = lerp(offsetX, targetOffsetX, 0.1);
                offsetY = lerp(offsetY, targetOffsetY, 0.1);
                fill(themeConfig[currentTheme].geomColor); rectMode(CENTER);
                rect((gameBounds.minX + gameBounds.maxX)/2, (gameBounds.minY + gameBounds.maxY)/2, 300 * Math.min(1, loadingProgress), 10, 5);
                if (loadingProgress >= 1.0) { gameState = 'start'; showActionHint("Tap to Start", true); }
                pop(); return;
            }

            // Draw Bricks exactly as SVG
            let ogSeg = segments; let ogSpec = specialElements;
            segments = gameBricks.lines.map(l => l.seg);
            specialElements = {};
            gameBricks.nodes.forEach(n => specialElements[n.id] = {isNode: true, hp: n.hp});
            gameBricks.diamonds.forEach(d => specialElements[d.id] = {isDiamond: true});
            
            drawGeometry(themeConfig[currentTheme].geomColor);
            
            segments = ogSeg; specialElements = ogSpec;

            // Particles
            gameParticles.forEach(p => p.update());
            gameParticles = gameParticles.filter(p => p.life > 0);
            gameParticles.forEach(p => p.draw(themeConfig[currentTheme].geomColor));

            // Paddle
            fill(themeConfig[currentTheme].geomColor); noStroke(); rectMode(CENTER);
            rect(paddle.x, paddle.y, paddle.w, paddle.h);

            // Ball
            fill(themeConfig[currentTheme].cursorColor);
            circle(ball.x, ball.y, ball.r * 2);

            pop();

            if (isGameMode && (gameState === 'playing' || gameState === 'start')) {
                if (keys.left) paddle.x -= STEP * 0.6;
                if (keys.right) paddle.x += STEP * 0.6;
                paddle.x = constrain(paddle.x, gameBounds.minX + paddle.w/2, gameBounds.maxX - paddle.w/2);
                if (gameState === 'start') ball.x = paddle.x;
            }

            if (gameState === 'playing') physicsStep();

            if (gameState === 'gameover') {
                fill(0, 0, 0, 180);
                noStroke();
                rectMode(CORNER);
                rect(0, 0, width, height);
                fill(255);
                textAlign(CENTER, CENTER);
                textFont('Sora');
                textStyle(BOLD);
                textSize(48);
                text("Game Over!", width/2, height/2 - 20);
                textSize(16);
                textStyle(NORMAL);
                fill(200);
                text("Tap to restart", width/2, height/2 + 30);
            }
        }

        function exitGame() {
            isGameMode = false;
            document.body.classList.remove('game-active');
            document.getElementById('mode-text').style.display = 'inline';
            document.getElementById('game-hearts').style.display = 'none';
            document.getElementById('eraser-btn').style.display = 'flex';
            
            let menuBtn = document.getElementById('menu-btn');
            menuBtn.innerHTML = `<svg viewBox="0 0 24 24" class="theme-svg"><path d="M4 6h16M4 12h16M4 18h16" /></svg>`;
            menuBtn.onclick = function(e) { e.stopPropagation(); toggleDashboard(); };
            
            offsetX = width/2; offsetY = height/2; zoom = 0.48; 
            updateModeUI(); redraw();
        }

        // --- CORE P5 ---
        function setup() { 
            let c = createCanvas(windowWidth, windowHeight); c.parent('canvas-container'); offsetX = width/2; offsetY = height/2; 
            const canvasElem = document.getElementById('defaultCanvas0');
            
            canvasElem.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                activePointers.set(e.pointerId, e);
                
                if (activePointers.size === 1) {
                    mainPointerId = e.pointerId;
                    pX = e.clientX; pY = e.clientY;
                    isPointerDrawing = true;
                    handleGameInput('click');
                    handleStart(e.clientX, e.clientY);
                } else if (activePointers.size === 2) {
                    isPointerDrawing = false;
                    let pts = Array.from(activePointers.values());
                    lastPinchDist = getDist(pts[0], pts[1]);
                    isPanning = false;
                }
            });

            canvasElem.addEventListener('pointermove', (e) => {
                e.preventDefault();
                if (activePointers.has(e.pointerId)) {
                    activePointers.set(e.pointerId, e);
                }

                if (activePointers.size === 1 && e.pointerId === mainPointerId) {
                    let dx = e.clientX - pX; let dy = e.clientY - pY;
                    pX = e.clientX; pY = e.clientY;

                    if (isPointerDrawing && !isOverUI(pX, pY)) {
                        if (isGameMode && (gameState === 'playing' || gameState === 'start')) {
                            let worldDx = dx / zoom;
                            paddle.x = constrain(paddle.x + worldDx, gameBounds.minX + paddle.w/2, gameBounds.maxX - paddle.w/2);
                            if(gameState === 'start') ball.x = paddle.x;
                        }
                        else if (isResizingCanvas && !isGameMode) {
                            let worldX = (pX - offsetX) / zoom; let worldY = (pY - offsetY) / zoom;
                            let MM_TO_PX = LINE_WEIGHT / 12;
                            let newW_px = paperWidthMm * MM_TO_PX; let newH_px = paperHeightMm * MM_TO_PX;
                            if (activeCorner.includes('r')) newW_px = Math.max(50, worldX * 2);
                            if (activeCorner.includes('l')) newW_px = Math.max(50, -worldX * 2);
                            if (activeCorner.includes('b')) newH_px = Math.max(50, worldY * 2);
                            if (activeCorner.includes('t')) newH_px = Math.max(50, -worldY * 2);
                            paperWidthMm = newW_px / MM_TO_PX; paperHeightMm = newH_px / MM_TO_PX;
                            showActionHint(`${Math.round(paperWidthMm)} × ${Math.round(paperHeightMm)} mm`, true);
                            redraw();
                        } else if (isEraserActive && !isTimelapseUIOpen && !isGameMode) {
                            performEraserActionAt((pX - offsetX) / zoom, (pY - offsetY) / zoom);
                        } else if (isPanning && !isGameMode) {
                            offsetX += dx; offsetY += dy; redraw();
                        }
                    }
                } else if (activePointers.size === 2 && !isGameMode) {
                    let pts = Array.from(activePointers.values());
                    let currentDist = getDist(pts[0], pts[1]);
                    let midX = (pts[0].clientX + pts[1].clientX) / 2; let midY = (pts[0].clientY + pts[1].clientY) / 2;
                    applyZoom(currentDist / lastPinchDist, midX, midY);
                    lastPinchDist = currentDist; redraw();
                }
            });

            const endPointer = (e) => {
                e.preventDefault();
                if (e.pointerId === mainPointerId) {
                    handleEnd(e.clientX, e.clientY);
                    isPointerDrawing = false; mainPointerId = null;
                }
                activePointers.delete(e.pointerId);
                if (activePointers.size === 1) {
                    let remainingId = Array.from(activePointers.keys())[0];
                    mainPointerId = remainingId;
                    let remE = activePointers.get(remainingId);
                    pX = remE.clientX; pY = remE.clientY;
                    isPointerDrawing = false;
                }
            };

            canvasElem.addEventListener('pointerup', endPointer);
            canvasElem.addEventListener('pointercancel', endPointer);
            canvasElem.addEventListener('pointerout', endPointer);

            captureState(); 
        }

        function getDist(t1, t2) { return Math.sqrt(Math.pow(t2.clientX - t1.clientX, 2) + Math.pow(t2.clientY - t1.clientY, 2)); }
        
        function applyZoom(factor, centerX, centerY) {
            let oldZoom = zoom; zoom = constrain(zoom * factor, 0.05, 5);
            let worldX = (centerX - offsetX) / oldZoom; let worldY = (centerY - offsetY) / oldZoom;
            offsetX = centerX - worldX * zoom; offsetY = centerY - worldY * zoom;
            showActionHint(Math.round(zoom * 100) + '%', false); // Zoom Display
        }

        function draw() {
            if (isGameMode) { drawBreakMaze(); return; } // Branch directly to game engine

            let colors = themeConfig[currentTheme];
            if (isTimelapseUIOpen) background(255);
            else if (isExporting) clear();
            else background(colors.canvasBg);

            push(); translate(offsetX, offsetY); scale(zoom);
            
            if (isPaperVisible && !isExporting && !isTimelapseUIOpen) {
                let paperColor = currentTheme === 'light' ? '#ffffff' : (currentTheme === 'dark' ? '#1e1e1e' : '#1e293b');
                fill(paperColor); stroke('rgba(128,128,128,0.2)'); strokeWeight(2 / zoom); rectMode(CENTER);
                let wPx = paperWidthMm * (LINE_WEIGHT / 12); let hPx = paperHeightMm * (LINE_WEIGHT / 12);
                rect(0, 0, wPx, hPx);
                stroke(currentTheme === 'light' ? 160 : 80); strokeWeight(3 / zoom); noFill();
                let cLen = 20 / zoom; let halfW = wPx / 2; let halfH = hPx / 2;
                beginShape(); vertex(-halfW, -halfH + cLen); vertex(-halfW, -halfH); vertex(-halfW + cLen, -halfH); endShape(); 
                beginShape(); vertex(halfW - cLen, -halfH); vertex(halfW, -halfH); vertex(halfW, -halfH + cLen); endShape(); 
                beginShape(); vertex(-halfW, halfH - cLen); vertex(-halfW, halfH); vertex(-halfW + cLen, halfH); endShape(); 
                beginShape(); vertex(halfW - cLen, halfH); vertex(halfW, halfH); vertex(halfW, halfH - cLen); endShape(); 
            }

            if (!isExporting) {
                if (isTimelapseUIOpen) drawGrid('0,0,0', 0.15);
                else drawGrid(colors.dotColor, colors.dotAlpha);
            }
            drawGeometry(colors.geomColor);
            if (!isExporting) drawCursor();
            pop();
        }

        function drawGrid(dotRGB, alpha) {
            fill(`rgba(${dotRGB}, ${alpha})`); noStroke();
            let sI = floor((-offsetX/zoom)/STEP)-2, eI = ceil(((width-offsetX)/zoom)/STEP)+2;
            let sJ = floor((-offsetY/zoom)/STEP)-2, eJ = ceil(((height-offsetY)/zoom)/STEP)+2;
            for(let i=sI; i<=eI; i++) for(let j=sJ; j<=eJ; j++) circle(i*STEP, j*STEP, 1.5/zoom);
        }

        function drawGeometry(colValue) {
            let col = isExporting ? 0 : colValue; let ringD = BASE_STEP_VAL * 2; let innerHoleR = (ringD - LINE_WEIGHT) / 2;
            push(); let ctx = drawingContext; ctx.save(); ctx.beginPath(); ctx.rect(-100000, -100000, 200000, 200000);
            for (let id in specialElements) if (specialElements[id].isNode) {
                let [i, j] = id.split(',').map(Number); ctx.moveTo(i * STEP + innerHoleR, j * STEP); ctx.arc(i * STEP, j * STEP, innerHoleR, 0, TWO_PI, true);
            }
            ctx.clip(); stroke(col); strokeWeight(LINE_WEIGHT); strokeCap(SQUARE); strokeJoin(MITER); noFill();
            getPathGroups().forEach(group => { beginShape(); vertex(group[0].p1.x * STEP, group[0].p1.y * STEP); group.forEach(s => vertex(s.p2.x * STEP, s.p2.y * STEP)); endShape(); });
            ctx.restore(); pop();
            for(let id in specialElements) {
                let [i, j] = id.split(',').map(Number); let x = i*STEP, y = j*STEP;
                if(specialElements[id].isNode) { noFill(); stroke(col); strokeWeight(LINE_WEIGHT); ellipse(x, y, ringD, ringD); }
                if(specialElements[id].isDiamond) { fill(col); noStroke(); push(); translate(x, y + LINE_WEIGHT/2); rotate(QUARTER_PI); rectMode(CENTER); rect(0, 0, LINE_WEIGHT, LINE_WEIGHT); pop(); }
            }
        }

        function getPathGroups() {
            let groups = []; let remaining = [...segments];
            while (remaining.length > 0) {
                let group = [remaining.shift()], added = true;
                while (added) {
                    added = false;
                    for (let i = 0; i < remaining.length; i++) {
                        let last = group[group.length - 1], first = group[0], curr = remaining[i];
                        if (curr.p1.x === last.p2.x && curr.p1.y === last.p2.y) { group.push(remaining.splice(i, 1)[0]); added = true; break; }
                        else if (curr.p2.x === last.p2.x && curr.p2.y === last.p2.y) { group.push({p1: curr.p2, p2: curr.p1}); remaining.splice(i, 1); added = true; break; }
                        else if (curr.p2.x === first.p1.x && curr.p2.y === first.p1.y) { group.unshift(remaining.splice(i, 1)[0]); added = true; break; }
                        else if (curr.p1.x === first.p1.x && curr.p1.y === first.p1.y) { group.unshift({p1: curr.p2, p2: curr.p1}); remaining.splice(i, 1); added = true; break; }
                    }
                }
                groups.push(group);
            }
            return groups;
        }

        function drawCursor() {
            if (isEraserActive && !isTimelapseUIOpen) {
                let worldMX = (pX - offsetX) / zoom; let worldMY = (pY - offsetY) / zoom;
                noFill(); stroke("#FF6666"); strokeWeight(2 / zoom); fill("rgba(255, 102, 102, 0.15)"); ellipse(worldMX, worldMY, (eraserRadius * 2) / zoom); return;
            }
            if (isTimelapseUIOpen && !isPlayingTl && tlHistory.length > 0) {
                let frame = tlHistory[tlCurrentFrame]; if (!frame) return;
                let cI = frame.cursor.i, cJ = frame.cursor.j;
                push(); translate(cI * STEP, cJ * STEP); fill(themeConfig[currentTheme].drawCursor); noStroke(); rectMode(CENTER); rotate(QUARTER_PI); rect(0, 0, 20, 20); pop();
                return;
            } else if (isTimelapseUIOpen && !isPlayingTl) return;
            let colors = themeConfig[currentTheme]; let finalColor = isDrawingMode ? colors.drawCursor : colors.cursorColor;
            push(); translate(curI * STEP, curJ * STEP); fill(finalColor); noStroke(); rectMode(CENTER);
            if (lastDirection && lastDirection.di !== 0 && lastDirection.dj !== 0) rect(0, 0, 20, 20); else { rotate(QUARTER_PI); rect(0, 0, 20, 20); }
            pop();
        }

        function findSegment(x1, y1, x2, y2) {
            let p1 = {x:x1, y:y1}, p2 = {x:x2, y:y2}; if(p1.x > p2.x || (p1.x===p2.x && p1.y>p2.y)) [p1, p2] = [p2, p1];
            return segments.findIndex(s=>s.p1.x===p1.x && s.p1.y===p1.y && s.p2.x===p2.x && s.p2.y===p2.y);
        }

        function move(k) {
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            const m = {'1':[-1,1],'2':[0,1],'3':[1,1],'4':[-1,0],'6':[1,0],'7':[-1,-1],'8':[0,-1],'9':[1,-1]}; if(!m[k]) return;
            let [di, dj] = m[k];
            if (isDrawingMode && !isEraserActive && lastDirection !== null) {
                const prev = lastDirection; const isReversing = (di === -prev.di && dj === -prev.dj);
                if (isReversing) {
                    let segIdx = findSegment(curI, curJ, curI + di, curJ + dj);
                    if (segIdx !== -1) { saveState(); segments.splice(segIdx, 1); curI += di; curJ += dj; updateLastMoveAfterErase(); redraw(); captureState(); return; }
                    else if(repeatTimer) { stopRepeat(); return; }
                }
                let dot = di * prev.di + dj * prev.dj; if (dot < 0 && !isReversing) { if(repeatTimer) stopRepeat(); return; }
            }
            let id = `${curI},${curJ}`;
            if (isEraserActive || !isDrawingMode) {
                if (specialElements[id]?.isDiamond) { curI += di * 3; curJ += dj * 3; } else { curI += di; curJ += dj; }
                lastDirection = {di, dj};
            } else {
                saveState();
                if (specialElements[id]?.isDiamond) { addSeg(curI, curJ, curI+di, curJ+dj); addSeg(curI+di, curJ+dj, curI+di*2, curJ+dj*2); addSeg(curI+di*2, curJ+dj*2, curI+di*3, curJ+dj*3); curI += di * 3; curJ += dj * 3; }
                else { addSeg(curI, curJ, curI + di, curJ + dj); curI += di; curJ += dj; }
                lastDirection = {di, dj};
            }
            redraw(); captureState();
        }

        function updateLastMoveAfterErase() {
            let connected = segments.filter(s => (s.p1.x === curI && s.p1.y === curJ) || (s.p2.x === curI && s.p2.y === curJ));
            if (connected.length >= 1) { let s = connected[connected.length - 1]; let other = (s.p1.x === curI && s.p1.y === curJ) ? s.p2 : s.p1; lastDirection = {di: curI - other.x, dj: curJ - other.y}; }
            else lastDirection = null;
        }

        let repeatTimer = null, activeKey = null;
        function handleActionDown(k) {
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            k = k.toLowerCase(); if (activeKey === k) return; activeKey = k;
            if(k === ' ' || k === 'space' || k === 'm') { toggleMode(); return; } 
            if(k === 'e') { toggleEraser(); return; } if(k === 'u') { undo(); return; } if(k === 'r') { redo(); } if(k === 'x') { performReset(); return; } 
            if(k === '5') { toggleSpecial('isNode'); return; } if(k === '0') { toggleSpecial('isDiamond'); return; }
            if(['1','2','3','4','6','7','8','9'].includes(k)) { 
                move(k); if(repeatTimer) stopRepeat();
                repeatTimer = setTimeout(() => { repeatTimer = setInterval(() => move(k), REPEAT_INTERVAL); }, INITIAL_DELAY);
            }
        }
        function handleActionUp(k) { const key = k.toLowerCase(); if (activeKey === key) { stopRepeat(); activeKey = null; } }
        function stopRepeat() { if(repeatTimer) { clearTimeout(repeatTimer); clearInterval(repeatTimer); repeatTimer = null; } }

        function toggleSpecial(t) {
            if (isTimelapseUIOpen || !isDrawingMode || isEraserActive || isDashboardOpen || isGameMode) return;
            if (t === 'isDiamond' && (!lastDirection || lastDirection.di !== 0 || lastDirection.dj !== 1)) return;
            saveState(); let id = `${curI},${curJ}`; if(!specialElements[id]) specialElements[id] = {isNode:false, isDiamond:false};
            specialElements[id][t] = !specialElements[id][t];
            if (t==='isDiamond' && specialElements[id].isDiamond && lastDirection) { curI += lastDirection.di*3; curJ += lastDirection.dj*3; }
            if(!specialElements[id].isNode && !specialElements[id].isDiamond) delete specialElements[id];
            showActionHint(t === 'isNode' ? 'Node' : 'Diamond'); redraw(); captureState();
        }

        function addSeg(x1, y1, x2, y2) {
            let p1 = {x:x1, y:y1}, p2 = {x:x2, y:y2}; if(p1.x > p2.x || (p1.x===p2.x && p1.y>p2.y)) [p1, p2] = [p2, p1];
            let idx = segments.findIndex(s=>s.p1.x===p1.x && s.p1.y===p1.y && s.p2.x===p2.x && s.p2.y===p2.y);
            if(idx !== -1) segments.splice(idx, 1); else segments.push({p1, p2});
        }

        function performEraserActionAt(worldX, worldY) {
            if (isTimelapseUIOpen || isDashboardOpen || isGameMode) return;
            const rWorld = eraserRadius / zoom; const rSq = rWorld * rWorld; let changed = false;
            for (let id in specialElements) {
                let [i, j] = id.split(',').map(Number); let dx = i * STEP - worldX; let dy = j * STEP - worldY;
                if (dx * dx + dy * dy <= rSq) { if (!changed) saveState(); delete specialElements[id]; changed = true; }
            }
            let initialLength = segments.length;
            let newSegments = segments.filter(s => {
                let dx1 = s.p1.x * STEP - worldX; let dy1 = s.p1.y * STEP - worldY; let dx2 = s.p2.x * STEP - worldX; let dy2 = s.p2.y * STEP - worldY;
                return !(dx1 * dx1 + dy1 * dy1 <= rSq || dx2 * dx2 + dy2 * dy2 <= rSq);
            });
            if (newSegments.length !== initialLength) { if (!changed) saveState(); segments = newSegments; changed = true; }
            if (changed) { redraw(); captureState(); }
        }

        function exportFile(fmt) {
            if (isTimelapseUIOpen || isGameMode) return;
            if(isDashboardOpen) toggleDashboard();
            if(fmt==='svg') {
                const ringD = BASE_STEP_VAL * 2;
                const innerHoleR = (ringD - LINE_WEIGHT) / 2;
                let svgContent = "";
                
                let masks = "";
                for (let id in specialElements) {
                    if (specialElements[id].isNode) {
                        let [i, j] = id.split(',').map(Number);
                        masks += `<circle cx="${i * STEP}" cy="${j * STEP}" r="${innerHoleR}" fill="black"/>`;
                    }
                }

                let maskTag = "";
                if (masks !== "") {
                    maskTag = `<defs><mask id="holeMask"><rect x="-100000" y="-100000" width="200000" height="200000" fill="white"/>${masks}</mask></defs>`;
                }

                getPathGroups().forEach(g => {
                    let d = `M ${g[0].p1.x*STEP} ${g[0].p1.y*STEP}`; 
                    g.forEach(s => d += ` L ${s.p2.x*STEP} ${s.p2.y*STEP}`);
                    svgContent += `<path d="${d}" fill="none" stroke="black" stroke-width="${LINE_WEIGHT}" stroke-linecap="butt" stroke-linejoin="miter" ${masks !== "" ? 'mask="url(#holeMask)"' : ""}/>`;
                });

                for (let id in specialElements) {
                    let [i, j] = id.split(',').map(Number);
                    let x = i * STEP;
                    let y = j * STEP;
                    if (specialElements[id].isNode) {
                        svgContent += `<circle cx="${x}" cy="${y}" r="${ringD/2}" fill="none" stroke="black" stroke-width="${LINE_WEIGHT}"/>`;
                    }
                    if (specialElements[id].isDiamond) {
                        let ry = y + LINE_WEIGHT / 2;
                        svgContent += `<rect x="${x - LINE_WEIGHT/2}" y="${ry - LINE_WEIGHT/2}" width="${LINE_WEIGHT}" height="${LINE_WEIGHT}" fill="black" transform="rotate(45, ${x}, ${ry})"/>`;
                    }
                }

                let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1000 -1000 2000 2000">${maskTag}${svgContent}</svg>`;
                let b = new Blob([svg], {type:'image/svg+xml'}); 
                let a = document.createElement('a'); 
                a.href = URL.createObjectURL(b); 
                a.download='drawing.svg'; 
                a.click();
            } else { 
                isExporting = true; 
                redraw(); 
                setTimeout(() => { saveCanvas('drawing', 'png'); isExporting = false; redraw(); }, 100); 
            }
        }
        
        function mouseWheel(e) {
            if (e.ctrlKey) { 
                if (isEraserActive && !isTimelapseUIOpen && !isGameMode) { 
                    if (e.delta > 0) eraserRadius = Math.max(2, eraserRadius - 2); else eraserRadius = Math.min(300, eraserRadius + 2); 
                    updateModeUI(); redraw(); 
                } return false; 
            }
            if(!isGameMode) applyZoom(e.delta > 0 ? 1/1.1 : 1.1, pX || mouseX, pY || mouseY); 
            return false; 
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
        window.addEventListener('keydown', e => { 
            if(isGameMode) {
                if(e.key === 'ArrowLeft') { keys.left = true; handleGameInput('keydown'); }
                if(e.key === 'ArrowRight') { keys.right = true; handleGameInput('keydown'); }
            } else {
                if (e.repeat) return;
                handleActionDown(e.key); 
            }
        });
        window.addEventListener('keyup', e => { 
            if(isGameMode) {
                if(e.key === 'ArrowLeft') keys.left = false;
                if(e.key === 'ArrowRight') keys.right = false;
            } else {
                handleActionUp(e.key); 
            }
        });
    </script>
</body>
</html>
