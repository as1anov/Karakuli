<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Karakuli: Digital Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg-color: #e8e8e8;
            --canvas-bg: #e8e8e8;
            --panel-bg: rgba(188, 188, 188, 0.4); 
            --text-color: #000000; 
            --icon-color: #000000;
            --kbd-text-color: #6D6E71;
            --kbd-icon-color: #6D6E71;
            --kbd-label-color: #6D6E71;
            --ui-accent: rgba(0, 0, 0, 0.08);
            --glass-blur: blur(12px);
            --border-color: rgba(0, 0, 0, 0.1);
            --nav-cursor-color: #FF6666;
            --draw-cursor-color: #404040; 
            --active-key-color: #000000;
            --border-radius: 12px;
            --main-font: 'Sora', sans-serif;
            --header-height: 43px;
            --dot-color: 0, 0, 0;
            --dot-opacity: 0.25; 
            --icon-stroke: 2; 
            --active-btn-bg: rgba(0, 0, 0, 0.15); 
        }

        [data-theme="dark"] {
            --bg-color: #111111;
            --canvas-bg: #111111;
            --panel-bg: rgba(34, 34, 34, 0.3);
            --text-color: #E8E8E8;
            --icon-color: #E8E8E8;
            --kbd-text-color: #6D6E71;
            --kbd-icon-color: #6D6E71;
            --ui-accent: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.1);
            --dot-color: 255, 255, 255;
            --dot-opacity: 0.15;
            --active-btn-bg: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100svh; 
            background-color: var(--bg-color);
            overflow: hidden; font-family: var(--main-font);
            touch-action: none;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
        }

        .top-nav-container {
            position: absolute; top: 20px; left: 0; right: 0;
            z-index: 500; display: flex; justify-content: space-between;
            align-items: flex-start; padding: 0 20px; pointer-events: none;
        }

        .top-nav-wrapper { 
            display: flex; flex-direction: column; align-items: center; gap: 6px; 
            pointer-events: none; position: absolute; left: 50%; transform: translateX(-50%);
            width: fit-content;
        }
        
        .mode-header, .control-btn, .option-btn { 
            height: var(--header-height); border-radius: var(--border-radius); 
            color: var(--text-color); display: flex; justify-content: center; 
            align-items: center; cursor: pointer; transition: all 0.2s ease; 
            user-select: none; font-weight: 600; pointer-events: auto; 
            background: var(--panel-bg); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color);
        }
        
        .mode-header { width: 140px; font-size: 13px; text-align: center; }
        .control-btn { width: var(--header-height); aspect-ratio: 1 / 1; }
        
        .control-btn.active { 
            background: var(--active-btn-bg);
            border-color: var(--text-color);
        }
        
        .dropdown-options { 
            display: flex; flex-direction: column; gap: 8px; opacity: 0; 
            pointer-events: none; transform: translateY(-10px); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: absolute; top: 53px; right: 0; z-index: 1001; 
        }
        .dropdown-options.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .option-btn { width: 43px; font-size: 11px; font-weight: 500; flex-direction: column; }

        #mobile-keyboard {
            position: fixed; 
            bottom: 0px; 
            left: 50%;
            transform: translate(-50%, calc(100% - 25px)); 
            width: calc(100% - 40px); max-width: 400px; 
            z-index: 2000; border-radius: 28px; padding: 12px 12px 14px 12px;
            display: flex; flex-direction: column; gap: 6px;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
        }

        #mobile-keyboard.open { transform: translate(-50%, 0); }

        .keyboard-handle {
            width: 100%; height: 20px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; pointer-events: auto;
        }

        .handle-bar { width: 36px; height: 4px; background: var(--kbd-text-color); opacity: 0.15; border-radius: 10px; }

        .keyboard-row { display: grid; gap: 6px; }
        .row-3-col { grid-template-columns: repeat(3, 1fr); }
        .row-4-col { grid-template-columns: repeat(4, 1fr); align-items: stretch; }

        .v-key {
            aspect-ratio: 2.3 / 1; 
            background: var(--panel-bg); 
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--kbd-text-color); position: relative;
            user-select: none; 
            transition: background 0.2s, transform 0.1s; touch-action: none;
            overflow: hidden;
        }

        .v-key:active {
            background: var(--active-btn-bg);
            transform: scale(0.96);
        }

        .row-4-col .v-key { aspect-ratio: 1.8 / 1; }
        .v-key svg { 
            width: 26%; height: auto; 
            stroke: var(--kbd-icon-color); 
            stroke-width: var(--icon-stroke); 
            fill: none; 
            stroke-linecap: round; 
            stroke-linejoin: round; 
        }

        .v-key.key-8 svg { transform: translateY(2px); } 
        .v-key.key-2 svg { transform: translateY(-1px); } 
        .v-key.key-4 svg { transform: translateX(-1px); }
        .v-key.key-6 svg { transform: translateX(1px); }
        
        .v-key.key-0 svg { 
            width: 29%; 
            fill: var(--kbd-icon-color); /* Закрашиваем иконку */
            stroke: var(--kbd-icon-color); 
            stroke-width: var(--icon-stroke); 
            stroke-linejoin: round; 
        }

        .v-key .key-label {
            position: absolute; bottom: 5px; right: 7px;
            font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
            color: var(--kbd-label-color); opacity: 0.8;
        }
        
        .v-key.mode-key { justify-content: center; align-items: center; }
        .v-key .mode-label { 
            font-size: 12px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.8px;
            display: inline-block; color: var(--kbd-icon-color);
            transform: scaleY(1.3); transform-origin: center;
        }

        .v-key .mode-sub { 
            position: absolute; bottom: 5px; right: 8px; 
            font-size: 16px; font-weight: 950;
            color: var(--kbd-label-color); opacity: 0.9; 
            line-height: 1; letter-spacing: -1.5px;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; overflow: hidden; touch-action: none; }
        .indicator-text { font-size: 13.2px; font-weight: 600; color: var(--text-color); opacity: 0; transition: all 0.2s ease; height: 0; overflow: hidden; }
        .indicator-text.visible { opacity: 0.8; height: auto; margin-top: 4px; }
        
        .eraser-size-hint { font-size: 11px; font-weight: 700; color: var(--text-color); opacity: 0; margin-top: 2px; transition: opacity 0.3s; }
        .eraser-size-hint.visible { opacity: 1; }

        .theme-svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.98; fill: none; }
        
        body[data-theme="light"] .sun-icon { display: block; }
        body[data-theme="light"] .moon-icon { display: none; }
        body[data-theme="dark"] .sun-icon { display: none; }
        body[data-theme="dark"] .moon-icon { display: block; }

        .option-btn svg { width: 18px; height: 18px; }
    </style>
</head>
<body data-theme="light"> 
    
    <div class="top-nav-container">
        <div class="left-controls-group" style="display: flex; gap: 8px; pointer-events: none;">
            <div class="control-btn glass-panel" onclick="performReset()" title="Reset Canvas">
                <svg viewBox="0 0 24 24" class="theme-svg"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" /></svg>
            </div>
            <div class="control-btn glass-panel" id="eraser-btn" onclick="toggleEraser()" title="Eraser (E)">
                <svg viewBox="0 0 24 24" class="theme-svg">
                    <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" />
                    <path d="m22 21H7" />
                    <path d="m5 11 9 9" />
                </svg>
            </div>
        </div>

        <div class="top-nav-wrapper">
            <div class="mode-header glass-panel" onclick="toggleMode()">
                <span id="mode-text">Navigation</span>
            </div>
            <div id="eraser-hint" class="eraser-size-hint">SIZE: 25%</div>
            <div class="status-labels" style="display:flex; flex-direction:column; align-items:center;">
                <div id="action-indicator" class="indicator-text">Action</div>
            </div>
        </div>

        <div class="right-controls-group" style="display: flex; gap: 8px; pointer-events: none;">
            <div class="dropdown-container" style="position: relative;">
                <div class="control-btn glass-panel" id="theme-trigger">
                    <svg viewBox="0 0 24 24" class="theme-svg sun-icon"><circle cx="12" cy="12" r="5" /><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" /></svg>
                    <svg viewBox="0 0 24 24" class="theme-svg moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </div>
                <div class="dropdown-options" id="theme-menu">
                    <div class="option-btn glass-panel" onclick="setTheme('light')">
                        <svg viewBox="0 0 24 24" class="theme-svg"><circle cx="12" cy="12" r="5" /><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" /></svg>
                    </div>
                    <div class="option-btn glass-panel" onclick="setTheme('dark')">
                        <svg viewBox="0 0 24 24" class="theme-svg"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </div>
                </div>
            </div>
            <div class="dropdown-container" style="position: relative;">
                <div class="control-btn glass-panel" id="export-trigger">
                    <svg viewBox="0 0 24 24" class="theme-svg"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                </div>
                <div class="dropdown-options" id="export-menu">
                    <div class="option-btn glass-panel" onclick="exportFile('svg')">SVG</div>
                    <div class="option-btn glass-panel" onclick="exportFile('png')">PNG</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <div id="mobile-keyboard">
        <div class="keyboard-handle" onclick="document.getElementById('mobile-keyboard').classList.toggle('open')">
            <div class="handle-bar"></div>
        </div>

        <div class="keyboard-row row-3-col">
            <div class="v-key key-7" onpointerdown="vKeyStart(event, '7')" onpointerup="vKeyEnd(event, '7')">
                <svg viewBox="0 0 24 24"><path d="M15 9H9v6"/></svg>
                <span class="key-label">7</span>
            </div>
            <div class="v-key key-8" onpointerdown="vKeyStart(event, '8')" onpointerup="vKeyEnd(event, '8')">
                <svg viewBox="0 0 24 24"><path d="M8 12l4-4 4 4"/></svg>
                <span class="key-label">8</span>
            </div>
            <div class="v-key key-9" onpointerdown="vKeyStart(event, '9')" onpointerup="vKeyEnd(event, '9')">
                <svg viewBox="0 0 24 24"><path d="M9 9h6v6"/></svg>
                <span class="key-label">9</span>
            </div>
        </div>
        
        <div class="keyboard-row row-3-col">
            <div class="v-key key-4" onpointerdown="vKeyStart(event, '4')" onpointerup="vKeyEnd(event, '4')">
                <svg viewBox="0 0 24 24"><path d="M13 8l-4 4 4 4"/></svg>
                <span class="key-label">4</span>
            </div>
            <div class="v-key key-5" onpointerdown="vKeyStart(event, '5')" onpointerup="vKeyEnd(event, '5')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" /></svg>
                <span class="key-label">5</span>
            </div>
            <div class="v-key key-6" onpointerdown="vKeyStart(event, '6')" onpointerup="vKeyEnd(event, '6')">
                <svg viewBox="0 0 24 24"><path d="M11 8l4 4-4 4"/></svg>
                <span class="key-label">6</span>
            </div>
        </div>
        
        <div class="keyboard-row row-3-col">
            <div class="v-key key-1" onpointerdown="vKeyStart(event, '1')" onpointerup="vKeyEnd(event, '1')">
                <svg viewBox="0 0 24 24"><path d="M15 15H9V9"/></svg>
                <span class="key-label">1</span>
            </div>
            <div class="v-key key-2" onpointerdown="vKeyStart(event, '2')" onpointerup="vKeyEnd(event, '2')">
                <svg viewBox="0 0 24 24"><path d="M8 12l4 4 4-4"/></svg>
                <span class="key-label">2</span>
            </div>
            <div class="v-key key-3" onpointerdown="vKeyStart(event, '3')" onpointerup="vKeyEnd(event, '3')">
                <svg viewBox="0 0 24 24"><path d="M9 15h6V9"/></svg>
                <span class="key-label">3</span>
            </div>
        </div>
        
        <div class="keyboard-row row-4-col">
            <div class="v-key key-0" onpointerdown="vKeyStart(event, '0')" onpointerup="vKeyEnd(event, '0')">
                <svg viewBox="0 0 24 24"><path d="M12 5L19 12L12 19L5 12Z"/></svg>
                <span class="key-label">0</span>
            </div>
            <div class="v-key key-u" onpointerdown="vKeyStart(event, 'u')" onpointerup="vKeyEnd(event, 'u')">
                <svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4M5 10h11a4 4 0 1 1 0 8"/></svg>
                <span class="key-label">U</span>
            </div>
            <div class="v-key key-r" onpointerdown="vKeyStart(event, 'r')" onpointerup="vKeyEnd(event, 'r')">
                <svg viewBox="0 0 24 24"><path d="M15 14l4-4-4-4M19 10H8a4 4 0 1 0 0 8"/></svg>
                <span class="key-label">R</span>
            </div>
            <div class="v-key mode-key" onpointerdown="vKeyStart(event, ' ')" onpointerup="vKeyEnd(event, ' ')">
                <span class="mode-label">MODE</span>
                <span class="mode-sub">⎽⎽</span>
            </div>
        </div>
    </div>

    <script>
        const BASE_STEP_VAL = 60; let STEP = 30; let LINE_WEIGHT = 58; 
        let segments = []; let specialElements = {}; 
        let curI = 0, curJ = 0; let lastDirection = {di: 0, dj: 1}; 
        let isDrawingMode = false; let isEraserActive = false;
        const DEFAULT_ERASER_RADIUS = 40; let eraserRadius = DEFAULT_ERASER_RADIUS * 0.25; 
        let offsetX = 0, offsetY = 0; let zoom = 0.48; 
        let history = [], redoStack = []; let isExporting = false;
        let actionTimeout = null; let currentTheme = 'light';

        const themeConfig = {
            light: { canvasBg: '#e8e8e8', dotColor: '0, 0, 0', dotAlpha: 0.25, geomColor: '#000000' },
            dark: { canvasBg: '#111111', dotColor: '255, 255, 255', dotAlpha: 0.15, geomColor: '#E8E8E8' }
        };

        function vKeyStart(e, k) { if (e) { e.preventDefault(); e.stopPropagation(); } handleActionDown(k); }
        function vKeyEnd(e, k) { if (e) { e.preventDefault(); e.stopPropagation(); } handleActionUp(k); }

        const exportMenu = document.getElementById('export-menu');
        const themeMenu = document.getElementById('theme-menu');
        document.getElementById('export-trigger').onclick = (e) => { e.stopPropagation(); exportMenu.classList.toggle('open'); themeMenu.classList.remove('open'); };
        document.getElementById('theme-trigger').onclick = (e) => { e.stopPropagation(); themeMenu.classList.toggle('open'); exportMenu.classList.remove('open'); };
        window.onclick = () => { exportMenu.classList.remove('open'); themeMenu.classList.remove('open'); };

        function setTheme(m) { currentTheme = m; document.body.setAttribute('data-theme', m); themeMenu.classList.remove('open'); redraw(); }
        function showActionHint(t) { 
            let a = document.getElementById('action-indicator'); a.innerText = t; a.classList.add('visible'); 
            if(actionTimeout) clearTimeout(actionTimeout);
            actionTimeout = setTimeout(()=>a.classList.remove('visible'), 1200); 
        }

        function saveState() {
            history.push(JSON.parse(JSON.stringify({segments, specialElements, curI, curJ, lastDirection}))); 
            if(history.length > 200) history.shift(); 
            redoStack = []; 
        }

        function undo() { 
            if(history.length > 0) { 
                redoStack.push(JSON.parse(JSON.stringify({segments, specialElements, curI, curJ, lastDirection}))); 
                let s = history.pop(); 
                segments = s.segments; specialElements = s.specialElements; curI = s.curI; curJ = s.curJ; lastDirection = s.lastDirection; 
                showActionHint('Undo'); redraw();
            }
        }

        function redo() { 
            if(redoStack.length > 0) { 
                history.push(JSON.parse(JSON.stringify({segments, specialElements, curI, curJ, lastDirection}))); 
                let s = redoStack.pop(); 
                segments = s.segments; specialElements = s.specialElements; curI = s.curI; curJ = s.curJ; lastDirection = s.lastDirection; 
                showActionHint('Redo'); redraw();
            }
        }
        
        function updateModeUI() {
            const modeHeader = document.getElementById('mode-text');
            const eraserHint = document.getElementById('eraser-hint');
            const eraserBtn = document.getElementById('eraser-btn');
            modeHeader.innerText = isDrawingMode ? "Drawing" : "Navigation";
            if (isEraserActive) { 
                eraserHint.classList.add('visible'); 
                eraserBtn.classList.add('active'); 
                let percent = Math.round((eraserRadius / DEFAULT_ERASER_RADIUS) * 100); 
                eraserHint.innerText = `SIZE: ${percent}%`; 
            } else { 
                eraserHint.classList.remove('visible'); 
                eraserBtn.classList.remove('active'); 
            }
        }

        function toggleMode() { if (isEraserActive) isEraserActive = false; else isDrawingMode = !isDrawingMode; updateModeUI(); redraw(); }
        function toggleEraser() { isEraserActive = !isEraserActive; if (isEraserActive) { if (eraserRadius === DEFAULT_ERASER_RADIUS) eraserRadius = DEFAULT_ERASER_RADIUS * 0.25; } updateModeUI(); redraw(); }

        function performReset() { saveState(); segments = []; specialElements = {}; curI = 0; curJ = 0; offsetX = width / 2; offsetY = height / 2; showActionHint('Reset'); redraw(); }

        function performEraserActionAt(worldX, worldY) {
            const rWorld = eraserRadius / zoom; const rSq = rWorld * rWorld; let changed = false;
            for (let id in specialElements) {
                let [i, j] = id.split(',').map(Number); let dx = i * STEP - worldX; let dy = j * STEP - worldY;
                if (dx * dx + dy * dy <= rSq) { if (!changed) saveState(); delete specialElements[id]; changed = true; }
            }
            let initialLength = segments.length;
            let newSegments = segments.filter(s => {
                let dx1 = s.p1.x * STEP - worldX; let dy1 = s.p1.y * STEP - worldY; let dx2 = s.p2.x * STEP - worldX; let dy2 = s.p2.y * STEP - worldY;
                return !(dx1 * dx1 + dy1 * dy1 <= rSq || dx2 * dx2 + dy2 * dy2 <= rSq);
            });
            if (newSegments.length !== initialLength) { if (!changed) saveState(); segments = newSegments; changed = true; }
            if (changed) redraw();
        }

        function setup() { let c = createCanvas(windowWidth, windowHeight); c.parent('canvas-container'); offsetX = width/2; offsetY = height/2; }

        function draw() {
            let colors = themeConfig[currentTheme];
            if (isExporting) clear(); else background(colors.canvasBg);
            let isOverUI = false; const kb = document.getElementById('mobile-keyboard'); const kbRect = kb.getBoundingClientRect();
            if (mouseX >= kbRect.left && mouseX <= kbRect.right && mouseY >= kbRect.top) isOverUI = true;
            if (mouseY < 80) isOverUI = true;
            if(!isExporting && mouseIsPressed && mouseButton===LEFT && !isOverUI) {
                if (isEraserActive) { let worldMX = (mouseX - offsetX) / zoom; let worldMY = (mouseY - offsetY) / zoom; performEraserActionAt(worldMX, worldMY); } 
                else { offsetX += mouseX - pmouseX; offsetY += mouseY - pmouseY; }
            }
            push(); translate(offsetX, offsetY); scale(zoom);
            if (!isExporting) drawGrid(colors.dotColor, colors.dotAlpha);
            drawGeometry(colors.geomColor);
            if (!isExporting) drawCursor();
            pop();
        }

        function drawGrid(dotRGB, alpha) {
            fill(`rgba(${dotRGB}, ${alpha})`); noStroke();
            let sI = floor((-offsetX/zoom)/STEP)-2, eI = ceil(((width-offsetX)/zoom)/STEP)+2;
            let sJ = floor((-offsetY/zoom)/STEP)-2, eJ = ceil(((height-offsetY)/zoom)/STEP)+2;
            for(let i=sI; i<=eI; i++) for(let j=sJ; j<=eJ; j++) circle(i*STEP, j*STEP, 1.5/zoom);
        }

        function drawGeometry(colValue) {
            let col = isExporting ? 0 : colValue; let ringD = BASE_STEP_VAL * 2; let innerHoleR = (ringD - LINE_WEIGHT) / 2;
            push(); let ctx = drawingContext; ctx.save(); ctx.beginPath(); ctx.rect(-100000, -100000, 200000, 200000);
            for (let id in specialElements) if (specialElements[id].isNode) {
                let [i, j] = id.split(',').map(Number); ctx.moveTo(i * STEP + innerHoleR, j * STEP); ctx.arc(i * STEP, j * STEP, innerHoleR, 0, TWO_PI, true);
            }
            ctx.clip(); stroke(col); strokeWeight(LINE_WEIGHT); strokeCap(SQUARE); strokeJoin(MITER); noFill();
            getPathGroups().forEach(group => { beginShape(); vertex(group[0].p1.x * STEP, group[0].p1.y * STEP); group.forEach(s => vertex(s.p2.x * STEP, s.p2.y * STEP)); endShape(); });
            ctx.restore(); pop();
            for(let id in specialElements) {
                let [i, j] = id.split(',').map(Number); let x = i*STEP, y = j*STEP;
                if(specialElements[id].isNode) { noFill(); stroke(col); strokeWeight(LINE_WEIGHT); ellipse(x, y, ringD, ringD); }
                if(specialElements[id].isDiamond) { fill(col); noStroke(); push(); translate(x, y + LINE_WEIGHT/2); rotate(QUARTER_PI); rectMode(CENTER); rect(0, 0, LINE_WEIGHT, LINE_WEIGHT); pop(); }
            }
        }

        function getPathGroups() {
            let groups = []; let remaining = [...segments];
            while (remaining.length > 0) {
                let group = [remaining.shift()], added = true;
                while (added) {
                    added = false;
                    for (let i = 0; i < remaining.length; i++) {
                        let last = group[group.length - 1], first = group[0], curr = remaining[i];
                        if (curr.p1.x === last.p2.x && curr.p1.y === last.p2.y) { group.push(remaining.splice(i, 1)[0]); added = true; break; }
                        else if (curr.p2.x === last.p2.x && curr.p2.y === last.p2.y) { group.push({p1: curr.p2, p2: curr.p1}); remaining.splice(i, 1); added = true; break; }
                        else if (curr.p2.x === first.p1.x && curr.p2.y === first.p1.y) { group.unshift(remaining.splice(i, 1)[0]); added = true; break; }
                        else if (curr.p1.x === first.p1.x && curr.p1.y === first.p1.y) { group.unshift({p1: curr.p2, p2: curr.p1}); remaining.splice(i, 1); added = true; break; }
                    }
                }
                groups.push(group);
            }
            return groups;
        }

        function drawCursor() {
            if (isEraserActive) {
                let worldMX = (mouseX - offsetX) / zoom; let worldMY = (mouseY - offsetY) / zoom;
                noFill(); stroke("#FF6666"); strokeWeight(2 / zoom); fill("rgba(255, 102, 102, 0.15)"); ellipse(worldMX, worldMY, (eraserRadius * 2) / zoom); return;
            }
            let finalColor = isDrawingMode ? (currentTheme==='dark' ? "#E8E8E8" : "#404040") : "#FF6666";
            push(); translate(curI*STEP, curJ*STEP); fill(finalColor); noStroke(); 
            if (lastDirection.di !== 0 && lastDirection.dj !== 0) rect(-10, -10, 20, 20); else { rotate(QUARTER_PI); rect(-10, -10, 20, 20); }
            pop();
        }

        function move(k) {
            const m = {'1':[-1,1],'2':[0,1],'3':[1,1],'4':[-1,0],'6':[1,0],'7':[-1,-1],'8':[0,-1],'9':[1,-1]};
            if(m[k]) {
                let [di, dj] = m[k]; lastDirection = {di, dj}; 
                let id = `${curI},${curJ}`;
                if (isDrawingMode && !isEraserActive) saveState();
                if (isEraserActive || !isDrawingMode) {
                    if (specialElements[id]?.isDiamond) { curI += di * 3; curJ += dj * 3; } 
                    else { curI += di; curJ += dj; }
                } 
                else if (isDrawingMode) {
                    if (specialElements[id]?.isDiamond) {
                        addSeg(curI, curJ, curI+di, curJ+dj); addSeg(curI+di, curJ+dj, curI+di*2, curJ+dj*2); addSeg(curI+di*2, curJ+dj*2, curI+di*3, curJ+dj*3);
                        curI += di * 3; curJ += dj * 3;
                    } else { 
                        addSeg(curI, curJ, curI + di, curJ + dj); curI += di; curJ += dj; 
                    }
                }
                redraw();
            }
        }

        function addSeg(x1, y1, x2, y2) {
            let p1 = {x:x1, y:y1}, p2 = {x:x2, y:y2};
            if(p1.x > p2.x || (p1.x===p2.x && p1.y>p2.y)) [p1, p2] = [p2, p1];
            let idx = segments.findIndex(s=>s.p1.x===p1.x && s.p1.y===p1.y && s.p2.x===p2.x && s.p2.y===p2.y);
            if(idx !== -1) segments.splice(idx, 1); else segments.push({p1, p2});
        }

        let repeatTimer = null, activeKey = null;
        function handleActionDown(k) {
            k = k.toLowerCase(); if (activeKey === k) return; activeKey = k;
            if(k === ' ' || k === 'space' || k === 'm') { toggleMode(); return; } 
            if(k === 'e') { toggleEraser(); return; }
            if(k === 'u') { undo(); return; }
            if(k === 'r') { redo(); return; }
            if(k === 'x') { performReset(); return; } 
            if(k === '5') { toggleSpecial('isNode'); return; }
            if(k === '0') { toggleSpecial('isDiamond'); return; }
            if(['1','2','3','4','6','7','8','9'].includes(k)) { 
                move(k); 
                if(repeatTimer) clearInterval(repeatTimer); 
                repeatTimer = setInterval(() => move(k), 120); 
            }
        }
        function handleActionUp(k) { 
            if (activeKey === k.toLowerCase()) { 
                if(repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; } 
                activeKey = null; 
            } 
        }

        function toggleSpecial(t) {
            if (!isDrawingMode || isEraserActive) return;
            saveState(); 
            let id = `${curI},${curJ}`;
            if(!specialElements[id]) specialElements[id] = {isNode:false, isDiamond:false};
            specialElements[id][t] = !specialElements[id][t];
            if (t==='isDiamond' && specialElements[id].isDiamond) { curI += lastDirection.di*3; curJ += lastDirection.dj*3; }
            if(!specialElements[id].isNode && !specialElements[id].isDiamond) delete specialElements[id];
            showActionHint(t === 'isNode' ? 'Node' : 'Diamond');
            redraw();
        }

        function exportFile(fmt) {
            if(fmt==='svg') {
                let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1000 -1000 2000 2000">`;
                getPathGroups().forEach(g => {
                    let d = `M ${g[0].p1.x*STEP} ${g[0].p1.y*STEP}`; g.forEach(s => d += ` L ${s.p2.x*STEP} ${s.p2.y*STEP}`);
                    svg += `<path d="${d}" fill="none" stroke="black" stroke-width="${LINE_WEIGHT}" stroke-linecap="butt" stroke-linejoin="miter"/>`;
                });
                svg += `</svg>`;
                let b = new Blob([svg], {type:'image/svg+xml'}); let a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='karakuli.svg'; a.click();
            } else { isExporting = true; redraw(); setTimeout(() => { saveCanvas('karakuli', 'png'); isExporting = false; redraw(); }, 100); }
        }
        
        function mouseWheel(e) {
            if (e.ctrlKey) {
                if (isEraserActive) { if (e.delta > 0) eraserRadius = Math.max(2, eraserRadius - 2); else eraserRadius = Math.min(300, eraserRadius + 2); updateModeUI(); redraw(); }
                return false;
            }
            let oldZoom = zoom; let worldX = (mouseX - offsetX) / oldZoom, worldY = (mouseY - offsetY) / oldZoom;
            if (e.delta > 0) zoom /= 1.1; else zoom *= 1.1;
            zoom = constrain(zoom, 0.05, 5); offsetX = mouseX - worldX * zoom; offsetY = mouseY - worldY * zoom;
            return false; 
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
        window.addEventListener('keydown', e => { if (e.repeat) return; handleActionDown(e.key); });
        window.addEventListener('keyup', e => { handleActionUp(e.key); });
    </script>
</body>
</html>
